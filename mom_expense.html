const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(){
  const pw=document.getElementById("pw").value;
  const err=document.getElementById("err");
  err.textContent="";
  try{
    const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey(
      {name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},
      km,{name:"AES-GCM",length:256},false,["decrypt"]);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(PAYLOAD));
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){
    err.textContent="비밀번호가 올바르지 않습니다.";
  }
}
document.getElementById("go").addEventListener("click",unlock);
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
</script>
